<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qichen AI Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  .container { width: 100%; max-width: 720px; }
  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 32px;
  }
  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    font-size: 0.82rem;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .task-area {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  textarea {
    width: 100%;
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e0e0e0;
    padding: 14px;
    font-size: 0.95rem;
    font-family: inherit;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: #6366f1; }
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  button {
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #4f46e5; }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    border: 1px solid #333;
    color: #999;
  }
  button.secondary:hover { background: #1a1a1a; color: #ccc; }
  .result-area {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px;
    display: none;
  }
  .result-area.visible { display: block; }
  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .result-tag {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 99px;
  }
  .result-tag.success { background: #064e3b; color: #34d399; }
  .result-tag.fail { background: #451a1a; color: #f87171; }
  .result-meta {
    font-size: 0.78rem;
    color: #666;
  }
  pre {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 14px;
    font-size: 0.85rem;
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .stderr { color: #f87171; }
  .legend {
    font-size: 0.78rem;
    color: #555;
    margin-bottom: 6px;
  }
  .loader {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #333;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h1>Qichen AI Agent</h1>
  <p class="subtitle">输入任务，AI 自主编写并执行代码</p>

  <div class="status-bar">
    <span class="status-dot"></span>
    <span id="status-text">检查状态...</span>
  </div>

  <div class="task-area">
    <textarea id="task-input" placeholder="描述你的任务，例如：用Python写一个计算斐波那契数列的函数"></textarea>
    <div class="btn-row">
      <button id="run-btn" onclick="runTask()">▶ 执行</button>
      <button class="secondary" onclick="clearResult()">清除</button>
    </div>
  </div>

  <div class="result-area" id="result-area">
    <div class="result-header">
      <span class="result-tag" id="result-tag"></span>
      <span class="result-meta" id="result-meta"></span>
    </div>
    <div class="legend">输出</div>
    <pre id="stdout">-</pre>
    <div id="stderr-block" style="display:none">
      <div class="legend">错误</div>
      <pre class="stderr" id="stderr">-</pre>
    </div>
  </div>
</div>

<script>
const API = "";

async function checkStatus() {
  try {
    const r = await fetch(API + "/soul");
    const d = await r.json();
    document.getElementById("status-text").textContent =
      `成熟度 ${(d.maturity*100).toFixed(1)}% · 规则 ${d.rules.length} · 任务 ${d.total_tasks}`;
  } catch {
    document.getElementById("status-text").textContent = "服务离线";
  }
}

async function runTask() {
  const task = document.getElementById("task-input").value.trim();
  if (!task) return;

  const btn = document.getElementById("run-btn");
  const area = document.getElementById("result-area");
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> 执行中...';
  area.classList.remove("visible");

  try {
    const r = await fetch(API + "/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ task }),
    });
    const d = await r.json();

    area.classList.add("visible");
    const tag = document.getElementById("result-tag");
    if (d.success) {
      tag.textContent = "成功";
      tag.className = "result-tag success";
    } else {
      tag.textContent = "失败";
      tag.className = "result-tag fail";
    }
    document.getElementById("result-meta").textContent =
      `重试 ${d.retries} 次 · 成熟度 ${(d.maturity*100).toFixed(1)}%`;

    document.getElementById("stdout").textContent = d.stdout || "(无输出)";

    const stderrBlock = document.getElementById("stderr-block");
    if (d.stderr) {
      stderrBlock.style.display = "block";
      document.getElementById("stderr").textContent = d.stderr;
    } else {
      stderrBlock.style.display = "none";
    }
  } catch (e) {
    area.classList.add("visible");
    document.getElementById("result-tag").textContent = "请求失败";
    document.getElementById("result-tag").className = "result-tag fail";
    document.getElementById("stdout").textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "▶ 执行";
  }
}

function clearResult() {
  document.getElementById("result-area").classList.remove("visible");
  document.getElementById("task-input").value = "";
}

document.getElementById("task-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && e.ctrlKey) runTask();
});

checkStatus();
</script>
</body>
</html>
